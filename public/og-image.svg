<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="oklch(98.8% 0.003 80)"/>
      <stop offset="1" stop-color="oklch(94% 0.005 80)"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="oklch(66% 0.21 45)"/>
      <stop offset="1" stop-color="oklch(72% 0.20 35)"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle baseline grid -->
  <g stroke="oklch(91% 0.005 270)" stroke-width="1" opacity="0.55">
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="220" x2="1200" y2="220"/>
    <line x1="0" y1="380" x2="1200" y2="380"/>
    <line x1="0" y1="500" x2="1200" y2="500"/>
  </g>

  <!-- Brand chip -->
  <g transform="translate(80, 80)">
    <rect width="170" height="44" rx="8" fill="oklch(15% 0.018 270)"/>
    <text x="20" y="29" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="18" font-weight="600" fill="oklch(98% 0.005 80)">react-floaty</text>
    <text x="138" y="29" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="20" font-weight="700" fill="url(#accent)">/</text>
  </g>

  <!-- Headline -->
  <g transform="translate(80, 240)">
    <text font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-weight="700" font-size="116" fill="oklch(15% 0.018 270)" letter-spacing="-4">
      <tspan x="0" y="0">Floating actions<tspan fill="url(#accent)">.</tspan></tspan>
      <tspan x="0" y="120">For React<tspan fill="url(#accent)">.</tspan></tspan>
    </text>
  </g>

  <!-- Subhead -->
  <g transform="translate(80, 530)">
    <text font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="26" fill="oklch(34% 0.015 270)">
      <tspan x="0" y="0">~8 KB ESM · zero runtime deps · WAI-ARIA · SSR-safe</tspan>
    </text>
  </g>

  <!-- Floating bar mock (bottom right) -->
  <g transform="translate(720, 470)">
    <rect width="400" height="62" rx="14" fill="oklch(98% 0.003 80)"
          stroke="oklch(91% 0.005 270)" stroke-width="1"/>
    <g font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="15" font-weight="500" fill="oklch(15% 0.018 270)">
      <rect x="8" y="9" width="100" height="44" rx="10" fill="oklch(94% 0.005 270)"/>
      <text x="44" y="36">Copy</text>
      <rect x="116" y="9" width="100" height="44" rx="10" fill="oklch(94% 0.005 270)"/>
      <text x="148" y="36">Share</text>
      <rect x="224" y="9" width="120" height="44" rx="10" fill="oklch(94% 0.005 270)"/>
      <text x="252" y="36">Archive</text>
      <rect x="352" y="9" width="40" height="44" rx="10" fill="oklch(94% 0.005 270)"/>
      <text x="368" y="36" text-anchor="middle">+</text>
    </g>
  </g>
</svg>
